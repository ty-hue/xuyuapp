name: pixelfree_camera
description: "Cross-platform beauty camera plugin scaffold."
version: 0.0.1
homepage:

environment:
  sdk: ^3.10.4
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  image: ^4.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.pixelfree_camera
        pluginClass: PixelfreeCameraPlugin
      ios:
        pluginClass: PixelfreeCameraPlugin
        sharedDarwinSource: true
